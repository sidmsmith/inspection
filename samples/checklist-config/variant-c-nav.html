<!DOCTYPE html>
<html lang="en" class="theme-manhattan">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Config — Variant C (Nav)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="shared.css" rel="stylesheet" />
  <link href="checklist-admin.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-body">
        <h1><i class="fa-solid fa-sidebar"></i> Checklist Config</h1>
        <div class="subtitle">
          Variant C — navigator + detail ·
          <span class="sample-tag">PO</span> ·
          <a href="index.html" class="text-muted">all samples</a>
        </div>
      </div>
    </header>

    <div id="orgSection" class="auth-section">
      <label class="form-label" for="org">ORG:</label>
      <div class="auth-row">
        <input type="text" id="org" class="form-control" placeholder="SS-DEMO" maxlength="20" value="SS-DEMO" />
        <button id="authBtn" class="btn btn-success px-4" type="button">Authenticate</button>
      </div>
      <small class="text-muted">Press Enter to authenticate</small>
    </div>

    <div class="app-status" id="status">Enter ORG and authenticate</div>

    <div id="mainUI" style="display: none;">
      <div class="config-toolbar">
        <div class="field-grow">
          <label class="form-label">Object type</label>
          <input type="text" class="form-control" value="PO" readonly />
        </div>
        <div class="toolbar-actions">
          <button type="button" class="btn btn-outline-warning btn-sm" id="clearBtn"><i class="fa-solid fa-eraser"></i> Clear PO</button>
          <button type="button" class="btn btn-primary btn-sm" id="addBtn"><i class="fa-solid fa-plus"></i> Add question</button>
          <button type="button" class="btn btn-success" id="saveBtn"><i class="fa-solid fa-cloud-arrow-up"></i> Save &amp; Deploy</button>
        </div>
      </div>

      <div class="config-layout-nav">
        <nav class="line-nav-panel">
          <div class="form-label mb-2">PO questions <span class="text-muted" id="qCount"></span></div>
          <div id="navHost"></div>
        </nav>
        <div class="detail-editor-panel">
          <div id="detailHost"></div>
          <div class="preview-panel" style="position: static;">
            <h2><i class="fa-solid fa-eye"></i> Preview</h2>
            <div id="previewHost"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="mock-po-config.js"></script>
  <script src="shared-samples.js"></script>
  <script>
    let fields = clonePoFields();
    let activeIdx = 0;
    let addingNew = false;

    const orgInput = document.getElementById('org');
    const authBtn = document.getElementById('authBtn');
    const orgSection = document.getElementById('orgSection');
    const mainUI = document.getElementById('mainUI');
    const statusEl = document.getElementById('status');
    const navHost = document.getElementById('navHost');
    const detailHost = document.getElementById('detailHost');
    const previewHost = document.getElementById('previewHost');
    const qCount = document.getElementById('qCount');

    function refresh() {
      renderPreview(fields, previewHost);
      qCount.textContent = `(${fields.length})`;
      renderNav();
      renderDetail();
    }

    function renderNav() {
      if (!fields.length) {
        navHost.innerHTML = '<p class="text-muted small mb-0">No questions</p>';
        return;
      }
      navHost.innerHTML = fields.map((f, i) => `
        <button type="button" class="question-nav-item${i === activeIdx && !addingNew ? ' active' : ''}" data-idx="${i}">
          ${escapeHtml(f.label)}
          <div class="nav-sub">${escapeHtml(typeLabelForField(f))}${f.required ? ' · Required' : ''}</div>
        </button>
      `).join('');
      navHost.querySelectorAll('.question-nav-item').forEach(btn => {
        btn.onclick = () => {
          activeIdx = +btn.dataset.idx;
          addingNew = false;
          renderNav();
          renderDetail();
        };
      });
    }

    function renderDetail() {
      detailHost.innerHTML = '';
      if (!fields.length && !addingNew) {
        detailHost.innerHTML = '<div class="empty-state"><p>Select or add a question from the toolbar.</p></div>';
        return;
      }
      const field = addingNew
        ? { label: '', type: 'segmented', options: ['Yes', 'No'] }
        : fields[activeIdx];
      if (!field) return;

      const panel = document.createElement('div');
      panel.className = 'card-panel';
      panel.innerHTML = `<h2><i class="fa-solid fa-pen-to-square"></i> ${addingNew ? 'New question' : 'Edit question'}</h2>`;
      const editor = createEditorForm({
        field,
        onSave: saved => {
          if (addingNew) {
            fields.push(saved);
            activeIdx = fields.length - 1;
            addingNew = false;
          } else {
            fields[activeIdx] = saved;
          }
          refresh();
        },
        onCancel: () => {
          if (addingNew) addingNew = false;
          renderDetail();
        }
      });
      panel.appendChild(editor);
      if (!addingNew && fields.length) {
        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'btn btn-outline-danger btn-sm mt-2';
        del.innerHTML = '<i class="fa-solid fa-trash"></i> Delete this question';
        del.onclick = () => {
          fields.splice(activeIdx, 1);
          activeIdx = Math.max(0, activeIdx - 1);
          refresh();
        };
        panel.appendChild(del);
      }
      detailHost.appendChild(panel);
    }

    document.getElementById('addBtn').onclick = () => {
      addingNew = true;
      renderNav();
      renderDetail();
    };
    document.getElementById('clearBtn').onclick = () => {
      if (confirmClear()) {
        fields = [];
        activeIdx = 0;
        addingNew = false;
        refresh();
      }
    };
    document.getElementById('saveBtn').onclick = () => mockSaveDeploy(statusEl);

    bindAuth({
      orgInput, authBtn, orgSection, mainUI, statusEl,
      onAuth: () => {
        fields = clonePoFields();
        activeIdx = 0;
        addingNew = false;
        refresh();
      }
    });
  </script>
</body>
</html>
