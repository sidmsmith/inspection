<!DOCTYPE html>
<html lang="en" class="theme-manhattan">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Config — PO Editor (Sample)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="shared.css" rel="stylesheet" />
  <link href="checklist-admin.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-body">
        <h1><i class="fa-solid fa-columns"></i> Checklist Config</h1>
        <div class="subtitle">
          Split editor + interactive live preview ·
          <span class="sample-tag">PO</span>
        </div>
      </div>
    </header>

    <div id="orgSection" class="auth-section">
      <label class="form-label" for="org">ORG:</label>
      <div class="auth-row">
        <input type="text" id="org" class="form-control" placeholder="SS-DEMO" maxlength="20" value="SS-DEMO" />
        <button id="authBtn" class="btn btn-success px-4" type="button">Authenticate</button>
      </div>
      <small class="text-muted">Press Enter to authenticate</small>
    </div>

    <div class="app-status" id="status">Enter ORG and authenticate</div>

    <div id="mainUI" style="display: none;">
      <div class="config-toolbar">
        <div class="field-grow">
          <label class="form-label">Object type</label>
          <input type="text" class="form-control" value="PO" readonly />
        </div>
        <div class="toolbar-actions">
          <button type="button" class="btn btn-outline-warning btn-sm" id="clearBtn"><i class="fa-solid fa-eraser"></i> Clear PO</button>
          <button type="button" class="btn btn-success" id="saveBtn"><i class="fa-solid fa-cloud-arrow-up"></i> Save &amp; Deploy</button>
        </div>
      </div>

      <div class="config-layout-split">
        <div>
          <div id="editorHost"></div>
          <div id="listHost"></div>
        </div>
        <div class="preview-panel">
          <div class="preview-panel-header">
            <div class="preview-panel-titles">
              <h2><i class="fa-solid fa-eye"></i> Live preview</h2>
              <p class="preview-note">Interactive preview — matches inspector form behavior</p>
            </div>
            <!-- PRODUCTION: wire preview-theme-gear to inspection themeSelectorBtn / applyTheme() -->
            <button type="button" class="preview-theme-gear theme-selector-btn" title="Select preview theme" aria-label="Select preview theme">
              <i class="fas fa-cog"></i>
            </button>
          </div>
          <div id="previewHost"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="mock-po-config.js"></script>
  <script src="shared-samples.js"></script>
  <script>
    let fields = clonePoFields();
    let selectedIdx = -1;
    let insertAt = null;
    let currentOrg = '';

    const orgInput = document.getElementById('org');
    const authBtn = document.getElementById('authBtn');
    const orgSection = document.getElementById('orgSection');
    const mainUI = document.getElementById('mainUI');
    const statusEl = document.getElementById('status');
    const listHost = document.getElementById('listHost');
    const editorHost = document.getElementById('editorHost');
    const previewHost = document.getElementById('previewHost');

    function refresh() {
      renderPreview(fields, previewHost);
      renderList();
    }

    function renderList() {
      mountQuestionListWithInsertSlots(listHost, {
        fields,
        selectedIdx,
        onInsertAt: at => openEditor(-1, at),
        onEdit: idx => openEditor(idx),
        onDelete: idx => {
          fields.splice(idx, 1);
          selectedIdx = -1;
          editorHost.innerHTML = '';
          refresh();
        },
        onReorder: (from, to) => {
          selectedIdx = adjustIndexAfterReorder(selectedIdx, from, to);
          refresh();
        },
        rowHtmlForField: (f, i, sel) => `
          <div class="question-row draggable-item${i === sel ? ' selected' : ''}" data-idx="${i}">
            <span class="grip" title="Drag to reorder"><i class="fa-solid fa-grip-vertical"></i></span>
            <div class="q-label">${escapeHtml(f.label)}${f.required ? ' <span class="required-asterisk">*</span>' : ''}</div>
            <span class="badge-type">${escapeHtml(typeLabelForField(f))}</span>
            <div class="q-actions">
              <button type="button" class="btn btn-outline-light btn-icon edit-btn" title="Edit"><i class="fa-solid fa-pen"></i></button>
              <button type="button" class="btn btn-outline-danger btn-icon del-btn" title="Delete"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>`
      });
    }

    function openEditor(idx, at = null) {
      selectedIdx = idx;
      insertAt = idx < 0 ? (at != null ? at : fields.length) : null;
      const field = idx >= 0 ? fields[idx] : newEmptyField();
      editorHost.innerHTML = '';
      editorHost.appendChild(createEditorForm({
        field,
        isNew: idx < 0,
        onSave: saved => {
          if (idx >= 0) fields[idx] = saved;
          else fields.splice(insertAt ?? fields.length, 0, saved);
          setPreviewFromField(saved);
          selectedIdx = -1;
          insertAt = null;
          editorHost.innerHTML = '';
          refresh();
        },
        onCancel: () => {
          selectedIdx = -1;
          insertAt = null;
          editorHost.innerHTML = '';
          renderList();
        }
      }));
      renderList();
    }

    document.getElementById('clearBtn').onclick = () => {
      if (confirmClear()) {
        fields = [];
        selectedIdx = -1;
        editorHost.innerHTML = '';
        clearPreviewState();
        refresh();
      }
    };
    document.getElementById('saveBtn').onclick = () => mockSaveDeploy(statusEl);

    bindAuth({
      orgInput, authBtn, orgSection, mainUI, statusEl,
      onAuth: org => {
        currentOrg = org;
        fields = clonePoFields();
        clearPreviewState();
        refresh();
      }
    });
  </script>
</body>
</html>
